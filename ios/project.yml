name: GuitarTutorial
options:
  bundleIdPrefix: com.guitartutorial
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"  # iPhone and iPad
    INFOPLIST_KEY_UIRequiredDeviceCapabilities: [arm64]
    INFOPLIST_KEY_UILaunchScreen: "LaunchScreen"
    INFOPLIST_KEY_CFBundleDisplayName: "Guitar Tutor"
    INFOPLIST_KEY_NSAppTransportSecurity:
      NSAllowsArbitraryLoads: true  # Allow HTTP for local dev

targets:
  GuitarTutorial:
    type: application
    platform: iOS
    sources:
      - GuitarTutorial
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.guitartutorial.app
        INFOPLIST_FILE: GuitarTutorial/Resources/Info.plist
        DEVELOPMENT_TEAM: ""  # Set your team ID here
    info:
      path: GuitarTutorial/Resources/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
