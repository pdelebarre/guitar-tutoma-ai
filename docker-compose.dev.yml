version: "3.8"

# Development profile: uses H2 in-memory database instead of PostgreSQL.
# Run with: docker compose -f docker-compose.dev.yml up

services:
  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - TUTORIALS_DIR=/tutorials
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-mistral}
      - CHROMA_SERVICE_URL=http://chroma:8001
    volumes:
      - tutorial_data:/tutorials
    depends_on:
      - ollama
      - chroma

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend

  ollama:
    image: ollama/ollama:latest
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Pull the model on startup
    entrypoint: >
      sh -c "ollama serve &
             sleep 5 &&
             ollama pull ${OLLAMA_MODEL:-mistral} &&
             wait"

  chroma:
    build:
      context: ./backend
      dockerfile: Dockerfile.chroma
    ports:
      - "${CHROMA_PORT:-8001}:8001"
    volumes:
      - chroma_data:/app/chroma_data
    environment:
      - CHROMA_SERVER_PORT=8001
      - CHROMA_PERSIST_DIR=/app/chroma_data
    depends_on:
      - ollama

volumes:
  ollama_data:
  chroma_data:
  tutorial_data:
